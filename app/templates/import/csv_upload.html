{% extends "base.html" %}
{% block title %}CSV Import{% endblock %}

{% block content %}
<div class="mx-auto" style="max-width: 42rem;">
    <div class="mb-4">
        <a href="{{ url_for('auth.settings') }}#integrations" class="small text-muted">&larr; Back to settings</a>
        <h1 class="fw-bold mt-2 mb-1">Import from CSV</h1>
        <p class="text-muted small mb-0">Import fuel logs, expenses, trips, or charging sessions from any CSV file.</p>
    </div>

    <form method="POST" action="{{ url_for('api.csv_import_preview') }}" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="mb-3">
                    <label for="data_type" class="form-label fw-medium">Data Type *</label>
                    <select name="data_type" id="data_type" required class="form-select">
                        <option value="fuel_logs">Fuel Logs</option>
                        <option value="expenses">Expenses</option>
                        <option value="trips">Trips</option>
                        <option value="charging_sessions">Charging Sessions</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="vehicle_id" class="form-label fw-medium">Vehicle *</label>
                    <select name="vehicle_id" id="vehicle_id" required class="form-select">
                        {% for vehicle in vehicles %}
                        <option value="{{ vehicle.id }}">{{ vehicle.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="file" class="form-label fw-medium">CSV File *</label>
                    <input type="file" name="file" id="file" accept=".csv" required class="form-control">
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end">
            <button type="submit" class="btn btn-primary">
                Next: Map Columns
            </button>
        </div>
    </form>
</div>
{% endblock %}
