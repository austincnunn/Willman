<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Willman</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow {
            animation: pulse 3s ease-in-out infinite;
        }
        html, body {
            height: 100%;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-4" style="min-height: 100vh;">
    <div class="text-center" style="max-width: 28rem; width: 100%;">
        <div class="mb-4">
            <svg class="mx-auto text-secondary animate-pulse-slow" style="height: 6rem; width: 6rem;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"/>
            </svg>
        </div>

        <h1 class="fw-bold mb-2">You're Offline</h1>
        <p class="text-muted mb-4">
            It looks like you've lost your internet connection. Please check your network settings and try again.
        </p>

        <div class="d-grid gap-2">
            <button onclick="location.reload()" class="btn btn-primary d-flex align-items-center justify-content-center gap-2">
                <svg style="height: 1rem; width: 1rem;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                Try Again
            </button>

            <button onclick="history.back()" class="btn btn-outline-secondary d-flex align-items-center justify-content-center gap-2">
                <svg style="height: 1rem; width: 1rem;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Go Back
            </button>
        </div>

        <p class="mt-4 small text-muted">
            Willman - Vehicle Management
        </p>
    </div>
</body>
</html>
