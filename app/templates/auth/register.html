{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block auth_content %}
<div class="w-100" style="max-width:28rem;">
    <div class="card shadow">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                {% if APP_LOGO %}
                <img src="{{ url_for('api.uploaded_file', filename=APP_LOGO) }}" alt="{{ APP_NAME }}" class="mb-3" style="height:3rem;">
                {% endif %}
                <h1 class="h3 fw-bold text-primary">{{ APP_NAME }}</h1>
                <p class="small text-muted mt-1">Create your account</p>
            </div>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" name="username" id="username" required autofocus class="form-control">
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" name="email" id="email" required class="form-control">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" name="password" id="password" required class="form-control">
                </div>

                <div class="mb-3">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" required class="form-control">
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Create Account
                </button>
            </form>

            <p class="mt-4 text-center small text-muted">
                Already have an account?
                <a href="{{ url_for('auth.login') }}" class="fw-medium">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
