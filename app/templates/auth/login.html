{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block auth_content %}
<div style="width:100%;max-width:28rem;">
    <div class="card shadow">
        <div class="card-body p-4 p-sm-5">
            <div class="text-center mb-4">
                {% if APP_LOGO %}
                <img src="{{ url_for('api.uploaded_file', filename=APP_LOGO) }}" alt="{{ APP_NAME }}" style="height:3rem;" class="mx-auto mb-3 d-block">
                {% endif %}
                <h1 class="fs-3 fw-bold text-primary">{{ APP_NAME }}</h1>
                <p class="text-muted small">{{ APP_TAGLINE }}</p>
            </div>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" name="username" id="username" required autofocus class="form-control">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" name="password" id="password" required class="form-control">
                </div>

                <div class="d-flex align-items-center justify-content-between mb-3">
                    <div class="form-check">
                        <input type="checkbox" name="remember" id="remember" class="form-check-input">
                        <label for="remember" class="form-check-label small">Remember me</label>
                    </div>
                    {% if smtp_configured %}
                    <a href="{{ url_for('auth.forgot_password') }}" class="small">Forgot password?</a>
                    {% endif %}
                </div>

                <button type="submit" class="btn btn-primary w-100">Sign in</button>
            </form>

            {% if registration_enabled %}
            <p class="mt-3 text-center text-muted small">
                Don't have an account?
                <a href="{{ url_for('auth.register') }}">Register</a>
            </p>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
