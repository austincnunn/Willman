{% extends "base.html" %}
{% block title %}Create User{% endblock %}

{% block content %}
<div class="mx-auto" style="max-width:42rem;">
    <div class="d-flex flex-column flex-sm-row align-items-sm-center justify-content-sm-between mb-4">
        <div>
            <h1 class="h4 fw-bold mb-1">{{ _('Create User') }}</h1>
            <p class="small text-muted mb-0">{{ _('Add a new user account') }}</p>
        </div>
        <a href="{{ url_for('auth.users') }}" class="btn btn-outline-secondary mt-3 mt-sm-0">
            {{ _('Back to Users') }}
        </a>
    </div>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="card shadow-sm mb-4">
            <div class="card-header">
                <h2 class="h6 fw-medium mb-0">{{ _('Account Details') }}</h2>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="username" class="form-label">{{ _('Username') }}</label>
                    <input type="text" name="username" id="username" required value="{{ request.form.get('username', '') }}" class="form-control">
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">{{ _('Email') }}</label>
                    <input type="email" name="email" id="email" required value="{{ request.form.get('email', '') }}" class="form-control">
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-12 col-sm-6">
                        <label for="password" class="form-label">{{ _('Password') }}</label>
                        <input type="password" name="password" id="password" required class="form-control">
                    </div>
                    <div class="col-12 col-sm-6">
                        <label for="confirm_password" class="form-label">{{ _('Confirm Password') }}</label>
                        <input type="password" name="confirm_password" id="confirm_password" required class="form-control">
                    </div>
                </div>

                <div class="form-check">
                    <input type="checkbox" name="is_admin" id="is_admin" class="form-check-input">
                    <label for="is_admin" class="form-check-label">{{ _('Administrator') }}</label>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end">
            <button type="submit" class="btn btn-primary">
                {{ _('Create User') }}
            </button>
        </div>
    </form>
</div>
{% endblock %}
