{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block auth_content %}
<div class="w-100" style="max-width:28rem;">
    <div class="card shadow">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                {% if APP_LOGO %}
                <img src="{{ url_for('api.uploaded_file', filename=APP_LOGO) }}" alt="{{ APP_NAME }}" class="mb-3" style="height:3rem;">
                {% endif %}
                <h1 class="h3 fw-bold text-primary">{{ APP_NAME }}</h1>
                <p class="small text-muted mt-1">Reset your password</p>
            </div>

            <p class="small text-muted mb-4">Enter your email address and we'll send you a link to reset your password.</p>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" name="email" id="email" required autofocus class="form-control">
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Send Reset Link
                </button>
            </form>

            <p class="mt-4 text-center small text-muted">
                <a href="{{ url_for('auth.login') }}" class="fw-medium">Back to login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
