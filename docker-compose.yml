services:
  willman:
    image: ghcr.io/austincnunn/willman:v0.15.2-jquery
    container_name: willman
    restart: unless-stopped
    ports:
      - "5151:5151"
    volumes:
      - /user/appdata/willman:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/willman.db
      - UPLOAD_FOLDER=/app/data/uploads
